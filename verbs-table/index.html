<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Irregular Verbs – Complete the Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f8f9fa;
}

.table-wrapper{
  max-width:1100px;
  margin:auto;
}

table input{
  width:100%;
}

input:disabled{
  background:#e9ecef;
  font-weight:bold;
}

.ok{
  color:#198754;
  font-weight:bold;
}

.bad{
  color:#dc3545;
  font-weight:bold;
}
</style>
</head>

<body class="p-4">

<h2 class="text-center mb-4">📝 Irregular Verbs – Complete the Table</h2>

<div class="table-wrapper">

<table class="table table-bordered align-middle">
<thead class="table-light">
<tr>
  <th>Infinitive</th>
  <th>Past Simple</th>
  <th>Past Participle</th>
  <th>Spanish</th>
</tr>
</thead>
<tbody id="verbsTable"></tbody>
</table>

<!-- ALERT DE RESULTADOS -->
<div id="resultAlert" class="mb-3"></div>

<div class="d-flex gap-2">
  <button class="btn btn-danger w-50" onclick="checkAnswers()">Corregir</button>
  <button class="btn btn-secondary w-50" onclick="newRound()">Nueva ronda</button>
</div>

</div>

<script>
const tbody = document.getElementById("verbsTable");
const alertBox = document.getElementById("resultAlert");

let allVerbs = [];
const ROUND_SIZE = 10;

/* =========================
   CARGA INICIAL DEL CSV
========================= */
fetch("verbs.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.trim().split("\n").slice(1);
    allVerbs = rows.map(line => line.split(","));
    newRound();
  });

/* =========================
   UTILIDADES
========================= */
function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function normalize(t){
  return t.toLowerCase().trim();
}

/* =========================
   NUEVA RONDA
========================= */
function newRound(){
  tbody.innerHTML = "";
  alertBox.innerHTML = "";

  const roundVerbs = shuffle([...allVerbs]).slice(0, ROUND_SIZE);

  roundVerbs.forEach(([inf, past, part, spa]) => {

    const hintIndex = Math.floor(Math.random() * 3);
    const values = ["", "", ""];
    values[hintIndex] = [past, part, spa][hintIndex];

    tbody.innerHTML += `
    <tr data-past="${past}" data-part="${part}" data-spa="${spa}">
      <td><strong>${inf}</strong></td>
      ${values.map(v => `
        <td>
          <input class="form-control" value="${v}" ${v ? "disabled" : ""}>
          <div></div>
        </td>
      `).join("")}
    </tr>`;
  });
}

/* =========================
   CORREGIR RESPUESTAS
========================= */
function checkAnswers(){
  let totalVerbs = 0;
  let completedVerbs = 0;

  document.querySelectorAll("#verbsTable tr").forEach(row => {
    totalVerbs++;
    let rowCorrect = true;

    const correct = [
      row.dataset.past,
      row.dataset.part,
      row.dataset.spa
    ];

    row.querySelectorAll("td").forEach((td,i) => {
      if(i === 0) return;

      const input = td.querySelector("input");
      const feedback = td.querySelector("div");

      if(input.disabled){
        feedback.innerHTML = `<span class="ok">✔ Correcto</span>`;
        return;
      }

      const user = normalize(input.value);
      const answer = correct[i-1];

      const ok = answer.includes("/")
        ? answer.split("/").some(v => normalize(v) === user)
        : normalize(answer) === user;

      if(ok){
        feedback.innerHTML = `<span class="ok">✔ Correcto</span>`;
      } else {
        feedback.innerHTML = `<span class="bad">✘ ${answer}</span>`;
        rowCorrect = false;
      }
    });

    if(rowCorrect) completedVerbs++;
  });

  alertBox.innerHTML = `
  <div class="alert alert-info text-center" role="alert">
    ✅ Completaste correctamente <strong>${completedVerbs}</strong> de <strong>${totalVerbs}</strong> verbos
  </div>`;
}
</script>

</body>
</html>
