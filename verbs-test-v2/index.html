<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irregular Verbs Test</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .correct {
            border: 2px solid #198754 !important;
            background-color: #d1e7dd !important;
        }
        .incorrect {
            border: 2px solid #dc3545 !important;
            background-color: #f8d7da !important;
        }
        #quiz .form-label {
          font-weight: 600;
        }

        #quiz img {
          object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-body">

            <h1 class="text-center mb-4">Irregular Verbs Test</h1>

            <div id="quiz"></div>

            <div class="d-flex justify-content-start gap-2 mt-4">
                <button class="btn btn-primary" onclick="generateTest()">Nuevo Test</button>
                <button class="btn btn-success" onclick="checkAnswers()">Corregir</button>
            </div>

            <div id="result" class="alert alert-info mt-4 d-none"></div>

        </div>
    </div>
</div>

<script>
/* =============================
   Imágenes por verbo (MINÚSCULAS)
============================= */
const verbImages = {
  get: "https://media.baamboozle.com/uploads/images/1060901/1675799109_20618_url.jpeg",

  go: "https://globalsymbols.com/uploads/production/image/imagefile/23517/17_23518_3643bc51-3052-4c5f-af70-1375cc581d17.png",
  grow: "https://tradyteacher.wordpress.com/wp-content/uploads/2016/03/grow-up.jpg",
  hang: "https://globalsymbols.com/uploads/production/image/imagefile/14050/17_14051_36c86038-d51a-44bc-b008-4e6a113b9cb5.png",
  have: "https://examtimeassets.s3.amazonaws.com/uploads/media/image/14512759/desktop_ce24a027-0721-46ad-9f93-b4b76acdaf3e.jpg",
  hear: "https://media.baamboozle.com/uploads/images/273658/1616595723_8362.png",
  hide: "https://media.baamboozle.com/uploads/images/175825/1614177543_25288_url.jpeg",
  hit: "https://www.inglesmundial.com/palabras/hit.jpg",
  hold: "https://www.clipartmax.com/png/full/332-3322318_hold-hold-verb.png",
  hurt: "https://examtimeassets.s3.amazonaws.com/uploads/media/image/13392950/desktop_e5fb3e0a-72bc-4585-9565-fd627b12ecdc.png",
  keep: "https://cdn.langeek.co/photo/61284/original/?type=jpeg",
  know: "https://globalsymbols.com/uploads/production/image/imagefile/18713/17_18714_18848d97-e979-4125-9b75-6f1dcd9cc691.png",
  lead: "https://i.ytimg.com/vi/iG-w7JJ9W-M/maxresdefault.jpg",
  lean: "https://forum.wordreference.com/attachments/42165/",
  leave: "https://knowt-user-attachments.s3.amazonaws.com/d2c9f3b10b1c451db851c7f71861168a.png",
  lend: "https://www.shutterstock.com/image-vector/putting-money-hand-donate-lend-260nw-2413289647.jpg",
  let: "https://www.inglesmundial.com/palabras/let.jpg",
  lie: "https://learnenglishinbangkok.com/wp-content/uploads/2016/08/sunbathe-beach.jpg",
  lose: "https://ts.idictionary.co.kr/files/pd/word_sub_img/420x420/1527675045.jpg",
  make: "https://as1.ftcdn.net/jpg/03/04/04/98/1000_F_304049836_7MVTLJiTbpbKgc2Nl1IXO9yQtMS9ZJ3W.jpg",
  mean: "https://cdn.langeek.co/photo/62086/original/?type=jpeg",
  meet: "https://www.wikihow.com/images/thumb/3/3e/Meet-Your-Boyfriend%27s-Parents-Step-3-Version-2.jpg/aid1063805-v4-728px-Meet-Your-Boyfriend%27s-Parents-Step-3-Version-2.jpg.webp",
  mistake: "https://www.bbc.co.uk/staticarchive/efb78c8d828ccff15187cebe66c69829009f8a15.gif",
  pay: "https://globalsymbols.com/uploads/production/image/imagefile/22260/17_22261_54ed4bab-c890-4857-8038-a11df841a24c.png",
  put: "https://globalsymbols.com/uploads/production/image/imagefile/21456/17_21457_01c6e6e2-b21e-416c-9602-15a25488ec6d.png",
  read: "https://images.twinkl.co.uk/tw1n/image/private/t_630/u/ux/adverbial-phrases-wiki_ver_1.png",
  ride: "https://cdn.langeek.co/photo/29364/original/?type=jpeg",
  ring: "https://examtimeassets.s3.amazonaws.com/uploads/flash_card/image_question/9190410/desktop_b18d514f-b420-400e-ba31-855da0588678.jpeg",
  run: "https://media.baamboozle.com/uploads/images/137288/1608124614_104802",
  say: "https://eoienglishcorner.files.wordpress.com/2011/05/cotilleo-4.jpg?w=400&h=281",
  see: "https://d1pra95f92lrn3.cloudfront.net/media/thumb/761_fit512.jpg",
  sell: "https://examtimeassets.s3.amazonaws.com/uploads/media/image/9946212/image_primary_85a1d249-a78b-4732-815d-f6d614ba3642.jpg",
  send: "https://i.pinimg.com/736x/6a/1d/7e/6a1d7e8289bf40f538cf09af83c8eab0.jpg",
  set: "https://examtimeassets.s3.amazonaws.com/uploads/media/image/13053461/desktop_7260d322-c4de-44aa-9cb3-d5951209a7b0.jpg",
  shake: "https://globalsymbols.com/uploads/production/image/imagefile/16807/17_16808_1b787349-4e96-423a-b59b-89e15896d718.png",
  shine: "https://wordassociations.net/image/200x/svg_to_png/nicubunu_Light_bulb.png",
  show: "https://mammothmemory.net/images/user/base/French/remember-show-verb-montrer-in-french.634bd24.png"

};

let verbs = [];
const TOTAL_QUESTIONS = 15;

/* ================================
   Cargar CSV
============================= */
fetch("verbs.csv")
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    verbs = rows
      .map(r => r.trim())
      .filter(r => r)
      .map(r => {
        const [inf, past, part, esp] = r.split(",");
        return {
          inf: inf.trim().toLowerCase().replace(/\s*\(.*?\)/g, ""),
          past: past.trim().toLowerCase(),
          part: part.trim().toLowerCase(),
          esp: esp.trim().toLowerCase()
        };
      });
    generateTest();
  });

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function normalize(text) {
  return text.toLowerCase().trim().replace(/\s+/g, " ");
}

function speak(word) {
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = "en-US"; // inglés americano
  utterance.rate = 0.9;     // un poco más lento
  speechSynthesis.speak(utterance);
}

/* =============================
   Generar Test (CON IMÁGENES)
============================= */
function generateTest() {
  const quiz = document.getElementById("quiz");
  const result = document.getElementById("result");

  result.classList.add("d-none");
  quiz.innerHTML = `<div class="row g-4"></div>`;

  const row = quiz.querySelector(".row");

  for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
    const v = randomItem(verbs);
    const type = Math.floor(Math.random() * 3);

    let question = "";
    let answer = "";

    if (type === 0) {
      question = `Pasado simple de <b>${v.inf}</b>`;
      answer = v.past;
    } else if (type === 1) {
      question = `Participio pasado de <b>${v.inf}</b>`;
      answer = v.part;
    } else {
      question = `Significado en español de <b>${v.inf}</b>`;
      answer = v.esp;
    }

    const img = verbImages[v.inf];

    row.innerHTML += `
      <div class="col-12 col-md-6">
        <div class="p-3 border rounded bg-white h-100">
          <label class="form-label d-flex align-items-center justify-content-between">
          <span>${i}. ${question}</span>
          <button type="button"
                  class="btn btn-sm btn-outline-secondary ms-2"
                  onclick="speak('${v.inf}')"
                  title="Escuchar pronunciación">
            🔊
          </button>
        </label>

          ${img ? `
            <div class="text-center mb-2">
              <img src="${img}" class="img-fluid rounded shadow" style="max-height:160px">
            </div>
          ` : ""}

          <input type="text"
          class="form-control answer"
          data-answer="${answer}"
          data-type="${type}"
          data-audio="${type !== 2 ? answer : ''}">

    ${type !== 2 ? `
      <button type="button"
              class="btn btn-sm btn-outline-primary mt-2 audio-answer"
              onclick="speak('${answer}')"
              title="Escuchar respuesta correcta">
        🔊 Escuchar respuesta
      </button>
    ` : ""}

    <div class="feedback text-danger mt-1 d-none"></div>
        </div>
      </div>
    `;
  }
}

/* =============================
   Corregir respuestas
================================ */
function checkAnswers() {
  const inputs = document.querySelectorAll(".answer");
  let correct = 0;

  inputs.forEach(input => {
    const user = normalize(input.value);
    const ok = normalize(input.dataset.answer);
    const feedback = input.nextElementSibling;

    input.classList.remove("correct", "incorrect");
    feedback.classList.add("d-none");

    if (ok.split("/").includes(user)) {
      input.classList.add("correct");
      correct++;
    } else {
      input.classList.add("incorrect");
      feedback.classList.remove("d-none");
      feedback.innerHTML = `✔ Respuesta correcta: <b>${input.dataset.answer}</b>`;
    }
  });

  const result = document.getElementById("result");
  result.classList.remove("d-none");
  result.innerHTML = `<strong>Resultado:</strong> ${correct} / ${TOTAL_QUESTIONS}`;
}
</script>

</body>
</html>
