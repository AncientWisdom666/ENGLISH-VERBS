<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Regular Verbs Test</title>
    <link rel="icon" href="../assets/images/favicon.ico" type="image/x-icon">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ==================== FONDO INVERNAL + NIEVE ==================== */
        body {
            background: linear-gradient(135deg, #a8c0e0, #e0f0ff);
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* ==================== NIEVE MEJORADA ==================== */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .snow {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255,255,255,0.9);
            animation: snowfall linear infinite;
            opacity: 0.85;
        }

        @keyframes snowfall {
            0%   { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* Más cantidad de nieve */
        .snow:nth-child(1)  { width: 8px;  height: 8px;  left: 5%;  animation-duration: 11s; animation-delay: 0s; }
        .snow:nth-child(2)  { width: 12px; height: 12px; left: 12%; animation-duration: 16s; animation-delay: -3s; }
        .snow:nth-child(3)  { width: 6px;  height: 6px;  left: 20%; animation-duration: 13s; animation-delay: -7s; }
        .snow:nth-child(4)  { width: 10px; height: 10px; left: 28%; animation-duration: 19s; animation-delay: -1s; }
        .snow:nth-child(5)  { width: 7px;  height: 7px;  left: 38%; animation-duration: 14s; animation-delay: -10s; }
        .snow:nth-child(6)  { width: 9px;  height: 9px;  left: 45%; animation-duration: 17s; animation-delay: -5s; }
        .snow:nth-child(7)  { width: 5px;  height: 5px;  left: 55%; animation-duration: 12s; animation-delay: -8s; }
        .snow:nth-child(8)  { width: 11px; height: 11px; left: 65%; animation-duration: 20s; animation-delay: -2s; }
        .snow:nth-child(9)  { width: 8px;  height: 8px;  left: 75%; animation-duration: 15s; animation-delay: -12s; }
        .snow:nth-child(10) { width: 13px; height: 13px; left: 82%; animation-duration: 18s; animation-delay: -4s; }
        .snow:nth-child(11) { width: 6px;  height: 6px;  left: 90%; animation-duration: 13s; animation-delay: -9s; }

        /* ==================== ESTILOS ORIGINALES DEL TEST ==================== */
        .correct {
            border: 2px solid #198754 !important;
            background-color: #d1e7dd !important;
        }
        .incorrect {
            border: 2px solid #dc3545 !important;
            background-color: #f8d7da !important;
        }
        #quiz .form-label {
          font-weight: 600;
        }

        #quiz img {
          object-fit: cover;
        }

        /* Contenido por encima de la nieve */
        .container, .card {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <!-- Contenedor de nieve -->
    <div class="snow-container">
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
    </div>

    <div class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-body">

                <h1 class="text-center mb-4">Regular Verbs Test</h1>

                <div id="quiz"></div>

                <div class="d-flex justify-content-start gap-2 mt-4">
                    <button class="btn btn-primary" onclick="generateTest()">Nuevo Test</button>
                    <button class="btn btn-success" onclick="checkAnswers()">Corregir</button>
                </div>

                <div id="result" class="alert alert-info mt-4 d-none"></div>

            </div>
        </div>
    </div>
<script src="../Init/js/auth.js"></script>
<script>
/* =============================
   Imágenes por verbo (MINÚSCULAS)
============================= */

    intend:"https://media.istockphoto.com/id/1186357197/vector/the-dream-of-university-students-nearing-graduation-planning-future-life.jpg?s=612x612&w=0&k=20&c=jVT7TASCZbvq_b9HSqTUzMHeTP9wpnBUDpbrHOsppmU=",
    need:"https://cdni.iconscout.com/illustration/premium/thumb/feeding-poor-illustration-svg-download-png-3581623.png",

    point:"https://t4.ftcdn.net/jpg/05/76/09/03/360_F_576090330_Onng58BcerQoYYf00CiSNz8DPIkROA1K.jpg",
    rent:"https://img.freepik.com/vector-gratis/fondo-concepto-casa-alquiler_23-2147779983.jpg?semt=ais_hybrid&w=740&q=80",

    resist:"https://img.freepik.com/vector-premium/hombre-negocios-resistiendo-golpes-maquinas-boxeo-juguete-ambos-lados_466036-2534.jpg",
    start:"https://media.baamboozle.com/uploads/images/175689/1604949659_28215",
    visit:"https://cdn.langeek.co/photo/49141/original/?type=jpeg",
    wait:"https://globalsymbols.com/uploads/production/image/imagefile/44726/17_44727_4fef1099-5827-4a28-889b-cbb61af55163.png",

    erase:"https://globalsymbols.com/uploads/production/image/imagefile/15358/17_15359_bc1be4f7-0711-41f6-a2bf-5864f0b00dc3.png",
    finish:"https://www.clipartmax.com/png/middle/132-1322155_once-upon-a-time-i-was-a-newly-licensed-salesperson-finish-verb.png",
    help:"https://voca-land.sgp1.cdn.digitaloceanspaces.com/0/1757686090161/ae0f7d9e.jpg",
    jump:"https://tomi-digital-resources.storage.googleapis.com/images/classes/resources/rsc-275308-5f31fc824b84a.jpeg",
    like:"https://avi.cuaed.unam.mx/uapa/avi/ing_3/U_3/ing3_u3_t2/img/t9_imagen2.png",
    look:"https://www.200words-a-day.com/images/mirar.gif",
    miss:"https://media.istockphoto.com/id/878686726/pl/wektor/poj%C4%99cie-sp%C3%B3%C5%BAnienia.jpg?s=612x612&w=0&k=20&c=2VOlCfyYzprz5R2K27kb16Sqod18ipIy1-GGBgrRb54=",
    practice:"https://media.baamboozle.com/uploads/images/291312/1634441515_18244.png",
    push:"https://media.baamboozle.com/uploads/images/96169/1611681220_50314",
    shop:"https://i.pinimg.com/originals/2e/31/0d/2e310d22b0b382ebc5f838e202988e00.png",
    smoke:"https://globalsymbols.com/uploads/production/image/imagefile/5717/13_5717_4616c841-b8b0-40a6-b958-a3284d883b8d.svg",
    stop:"https://img.freepik.com/vector-premium/chico-lindo-haciendo-gesto-parada-senal-trafico-senal-stop_679557-951.jpg",
    talk:"https://cdn.teachoo.com/d86c12f4-b52f-49a1-a8e2-bbf676ba97b1/speak.jpg",
    use:"https://img.freepik.com/free-vector/boy-using-tablet-cartoon-character_1308-117316.jpg?w=360",
    walk:"https://media.baamboozle.com/uploads/images/768078/1657233138_26231.jpeg",
    wash:"https://www.quia.com/files/quia/users/jmdeming/Action-Verbs/Wash-Dishes",
    wish:"https://clipart-library.com/8300/1931/lovepik-holiday-wishing-girl-receiving-gifts-png-image_401734351_wh1200.png",
    work:"https://media.baamboozle.com/uploads/images/52192/1589215777_183567",
    
};

let verbs = [];
const TOTAL_QUESTIONS = 15;

/* ================================
   Cargar CSV
============================= */
fetch("verbs.csv")
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    verbs = rows
      .map(r => r.trim())
      .filter(r => r)
      .map(r => {
        const [inf, past, part, esp] = r.split(",");
        return {
          inf: inf.trim().toLowerCase().replace(/\s*\(.*?\)/g, ""),
          past: past.trim().toLowerCase(),
          part: part.trim().toLowerCase(),
          esp: esp.trim().toLowerCase()
        };
      });
    generateTest();
  });

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function normalize(text) {
  return text.toLowerCase().trim().replace(/\s+/g, " ");
}

function speak(word) {
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = "en-US";   // inglés americano
  utterance.rate = 0.9;      // velocidad un poco más lenta
  speechSynthesis.speak(utterance);
}

/* =============================
   Generar Test (CON IMÁGENES)
============================= */
function generateTest() {
  const quiz = document.getElementById("quiz");
  const result = document.getElementById("result");

  result.classList.add("d-none");
  quiz.innerHTML = `<div class="row g-4"></div>`;

  const row = quiz.querySelector(".row");

  for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
    const v = randomItem(verbs);
    const type = Math.floor(Math.random() * 3);

    let question = "";
    let answer = "";

    if (type === 0) {
      question = `Pasado simple de <b>${v.inf}</b>`;
      answer = v.past;
    } else if (type === 1) {
      question = `Participio pasado de <b>${v.inf}</b>`;
      answer = v.part;
    } else {
      question = `Significado en español de <b>${v.inf}</b>`;
      answer = v.esp;
    }

    const img = verbImages[v.inf];

    row.innerHTML += `
      <div class="col-12 col-md-6">
        <div class="p-3 border rounded bg-white h-100">
          <label class="form-label d-flex align-items-center justify-content-between">
          <span>${i}. ${question}</span>
          <button type="button"
                  class="btn btn-sm btn-outline-secondary ms-2"
                  onclick="speak('${v.inf}')"
                  title="Escuchar pronunciación">
            🔊
          </button>
        </label>

          ${img ? `
            <div class="text-center mb-2">
              <img src="${img}" class="img-fluid rounded shadow" style="max-height:160px">
            </div>
          ` : ""}

          <input type="text"
          class="form-control answer"
          data-answer="${answer}"
          data-type="${type}"
          data-audio="${type !== 2 ? answer : ''}">

    ${type !== 2 ? `
      <button type="button"
              class="btn btn-sm btn-outline-primary mt-2 audio-answer"
              onclick="speak('${answer}')"
              title="Escuchar respuesta correcta">
        🔊 Escuchar respuesta
      </button>
    ` : ""}

    <div class="feedback text-danger mt-1 d-none"></div>
        </div>
      </div>
    `;
  }
}

/* =============================
   Corregir respuestas
============================= */
function checkAnswers() {
  const inputs = document.querySelectorAll(".answer");
  let correct = 0;

  inputs.forEach(input => {
    const user = normalize(input.value);
    const ok = normalize(input.dataset.answer);
    const feedback = input.nextElementSibling;

    input.classList.remove("correct", "incorrect");
    feedback.classList.add("d-none");

    if (ok.split("/").includes(user)) {
      input.classList.add("correct");
      correct++;
    } else {
      input.classList.add("incorrect");
      feedback.classList.remove("d-none");
      feedback.innerHTML = `✔ Respuesta correcta: <b>${input.dataset.answer}</b>`;
    }
  });

  const result = document.getElementById("result");
  result.classList.remove("d-none");
  result.innerHTML = `<strong>Resultado:</strong> ${correct} / ${TOTAL_QUESTIONS}`;
}
</script>

</body>
</html>
