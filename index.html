<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irregular Verbs Test</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .correct {
            border: 2px solid #198754 !important;
            background-color: #d1e7dd !important;
        }
        .incorrect {
            border: 2px solid #dc3545 !important;
            background-color: #f8d7da !important;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-body">

            <h1 class="text-center mb-4">Irregular Verbs Test</h1>

            <div id="quiz"></div>

            <div class="d-flex justify-content-start gap-2 mt-4">
                <button class="btn btn-primary" onclick="generateTest()">Nuevo Test</button>
                <button class="btn btn-success" onclick="checkAnswers()">Corregir</button>
            </div>

            <div id="result" class="alert alert-info mt-4 d-none"></div>

        </div>
    </div>
</div>

<script>
/* =============================
   Imágenes por verbo (MINÚSCULAS)
============================= */

  bend: "https://www.yoganatomy.com/wp-content/uploads/2017/07/standing-forward-bend-hasta.jpg",

  bid: "https://thumbs.dreamstime.com/b/mazo-del-control-subastador-disposici%C3%B3n-los-compradores-que-aumentaban-la-tenencia-de-brazo-hicieron-una-oferta-las-paletas-con-119160732.jpg",
  bleed: "https://transcode-v2.app.engoo.com/image/fetch/f_auto,c_lfill,h_128,dpr_3/https://assets.app.engoo.com/images/mS1q5SDtborRMDpgy5GyWsKDIrQN8W79CgKaQzB8U9t.jpeg",
  blow: "https://globalsymbols.com/uploads/production/image/imagefile/14094/17_14095_1f40597f-34fb-4497-9d7c-d6964bc49588.png",
  break: "https://www.clipartmax.com/png/full/106-1069541_break-break-verb-clipart.png",
  bring: "https://cdn-icons-png.flaticon.com/512/5775/5775458.png",
  build: "https://images.unsplash.com/photo-1503387762-592deb58ef4e",
  burn: "https://www.thedermspecs.com/wp-content/uploads/2013/04/burn.png",
  burst: "https://www.200words-a-day.com/images/eclater.jpg",

  feel: "https://24.media.tumblr.com/tumblr_kyf40gFO9x1qzvvtvo1_400.gif",

  fly: "https://media.baamboozle.com/uploads/images/121249/1603124609_13426",
  forbid: "https://merriam-webster.com/assets/ld/word_of_the_day/images/2744/large.jpg",
  forget: "https://www.quia.com/files/quia/users/second2ndlanguage/forget.JPG",
  forgive: "https://thumbs.dreamstime.com/b/d-people-man-person-knees-begging-forgiveness-forgive-me-30268695.jpg",
  freeze: "https://media.baamboozle.com/uploads/images/282046/1616717710_10366.jpeg"
};

let verbs = [];
const TOTAL_QUESTIONS = 20;

/* ================================
   Cargar CSV
============================= */
fetch("verbs.csv")
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    verbs = rows
      .map(r => r.trim())
      .filter(r => r)
      .map(r => {
        const [inf, past, part, esp] = r.split(",");
        return {
          inf: inf.trim().toLowerCase().replace(/\s*\(.*?\)/g, ""),
          past: past.trim().toLowerCase(),
          part: part.trim().toLowerCase(),
          esp: esp.trim().toLowerCase()
        };
      });
    generateTest();
  });

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function normalize(text) {
  return text.toLowerCase().trim().replace(/\s+/g, " ");
}

/* =============================
   Generar Test (CON IMÁGENES)
============================= */
function generateTest() {
  const quiz = document.getElementById("quiz");
  const result = document.getElementById("result");
  quiz.innerHTML = "";
  result.classList.add("d-none");

  for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
    const v = randomItem(verbs);
    const type = Math.floor(Math.random() * 3);

    let question = "";
    let answer = "";

    if (type === 0) {
      question = `Pasado simple de <b>${v.inf}</b>`;
      answer = v.past;
    } else if (type === 1) {
      question = `Participio pasado de <b>${v.inf}</b>`;
      answer = v.part;
    } else {
      question = `Significado en español de <b>${v.inf}</b>`;
      answer = v.esp;
    }

    const img = verbImages[v.inf];

    quiz.innerHTML += `
      <div class="mb-4">
        <label class="form-label">${i}. ${question}</label>
        ${img ? `<div class="mb-2">
          <img src="${img}" class="img-fluid rounded shadow" style="max-height:180px">
        </div>` : ""}
        <input type="text" class="form-control answer" data-answer="${answer}">
        <div class="feedback text-danger mt-1 d-none"></div>
      </div>
    `;
  }
}

/* =============================
   Corregir respuestas
============================= */
function checkAnswers() {
  const inputs = document.querySelectorAll(".answer");
  let correct = 0;

  inputs.forEach(input => {
    const user = normalize(input.value);
    const ok = normalize(input.dataset.answer);
    const feedback = input.nextElementSibling;

    input.classList.remove("correct", "incorrect");
    feedback.classList.add("d-none");

    if (ok.split("/").includes(user)) {
      input.classList.add("correct");
      correct++;
    } else {
      input.classList.add("incorrect");
      feedback.classList.remove("d-none");
      feedback.innerHTML = `✔ Respuesta correcta: <b>${input.dataset.answer}</b>`;
    }
  });

  const result = document.getElementById("result");
  result.classList.remove("d-none");
  result.innerHTML = `<strong>Resultado:</strong> ${correct} / ${TOTAL_QUESTIONS}`;
}
</script>

</body>
</html>
