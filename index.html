<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irregular Verbs Test</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .correct {
            border: 2px solid #198754 !important;
            background-color: #d1e7dd !important;
        }
        .incorrect {
            border: 2px solid #dc3545 !important;
            background-color: #f8d7da !important;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-body">

            <h1 class="text-center mb-4">Irregular Verbs Test</h1>

            <div id="quiz"></div>

            <div class="d-flex justify-content-between mt-4">
                <button class="btn btn-primary" onclick="generateTest()">Nuevo Test</button>
                <button class="btn btn-success" onclick="checkAnswers()">Corregir</button>
            </div>

            <div id="result" class="alert alert-info mt-4 d-none"></div>

        </div>
    </div>
</div>

<script>
/* =============================
   Imágenes por verbo (MINÚSCULAS)
============================= */
const verbImages = {
  awake: "https://images.unsplash.com/photo-1507679799987-c73779587ccf",
  be: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
  bear: "https://images.unsplash.com/photo-1501706362039-c6e80948e91c",
  beat: "https://images.unsplash.com/photo-1521412644187-c49fa049e84d",
  become: "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70",
  begin: "https://images.unsplash.com/photo-1506784365847-bbad939e9335",
  bend: "https://images.unsplash.com/photo-1581579185169-7b5c0a7b7c1b",
  bet: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d",
  bind: "https://images.unsplash.com/photo-1519681393784-d120267933ba",
  bid: "https://images.unsplash.com/photo-1605902711622-cfb43c4437d1",
  bleed: "https://images.unsplash.com/photo-1582719478181-2d8b74e4c0c4",
  blow: "https://images.unsplash.com/photo-1501004318641-b39e6451bec6",
  break: "https://images.unsplash.com/photo-1504196606672-aef5c9cefc92",
  bring: "https://images.unsplash.com/photo-1511988617509-a57c8a288659",
  build: "https://images.unsplash.com/photo-1503387762-592deb58ef4e",
  burn: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429",
  burst: "https://images.unsplash.com/photo-1504674900247-0877df9cc836",
  buy: "https://images.unsplash.com/photo-1521334884684-d80222895322",
  catch: "https://images.unsplash.com/photo-1517649763962-0c623066013b",
  come: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
  cost: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e",
  cut: "https://images.unsplash.com/photo-1516822003754-cca485356ecb",
  choose: "https://images.unsplash.com/photo-1506784983877-45594efa4cbe",
  deal: "https://images.unsplash.com/photo-1521791136064-7986c2920216",
  dig: "https://images.unsplash.com/photo-1592928302636-7b8e1f0c9f4c",
  do: "https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b",
  draw: "https://images.unsplash.com/photo-1455390582262-044cdead277a",
  dream: "https://images.unsplash.com/photo-1500534623283-312aade485b7",
  drink: "https://images.unsplash.com/photo-1509042239860-f550ce710b93",
  drive: "https://images.unsplash.com/photo-1502877338535-766e1452684a",
  eat: "https://images.unsplash.com/photo-1540189549336-e6e99c3679fe",
  fall: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429",
  feed: "https://images.unsplash.com/photo-1517849845537-4d257902454a",
  feel: "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb",
  fight: "https://images.unsplash.com/photo-1521412644187-c49fa049e84d",
  find: "https://images.unsplash.com/photo-1506784983877-45594efa4cbe",
  flee: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429",
  fly: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
  forbid: "https://images.unsplash.com/photo-1607746882042-944635dfe10e",
  forget: "https://images.unsplash.com/photo-1500534623283-312aade485b7",
  forgive: "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70",
  freeze: "https://images.unsplash.com/photo-1482192596544-9eb780fc7f66"
};

let verbs = [];
const TOTAL_QUESTIONS = 20;

/* =============================
   Cargar CSV
============================= */
fetch("verbs.csv")
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    verbs = rows
      .map(r => r.trim())
      .filter(r => r)
      .map(r => {
        const [inf, past, part, esp] = r.split(",");
        return {
          inf: inf.trim().toLowerCase().replace(/\s*\(.*?\)/g, ""),
          past: past.trim().toLowerCase(),
          part: part.trim().toLowerCase(),
          esp: esp.trim().toLowerCase()
        };
      });
    generateTest();
  });

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function normalize(text) {
  return text.toLowerCase().trim().replace(/\s+/g, " ");
}

/* =============================
   Generar Test (CON IMÁGENES)
============================= */
function generateTest() {
  const quiz = document.getElementById("quiz");
  const result = document.getElementById("result");
  quiz.innerHTML = "";
  result.classList.add("d-none");

  for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
    const v = randomItem(verbs);
    const type = Math.floor(Math.random() * 3);

    let question = "";
    let answer = "";

    if (type === 0) {
      question = `Pasado simple de <b>${v.inf}</b>`;
      answer = v.past;
    } else if (type === 1) {
      question = `Participio pasado de <b>${v.inf}</b>`;
      answer = v.part;
    } else {
      question = `Significado en español de <b>${v.inf}</b>`;
      answer = v.esp;
    }

    const img = verbImages[v.inf];

    quiz.innerHTML += `
      <div class="mb-4">
        <label class="form-label">${i}. ${question}</label>
        ${img ? `<div class="mb-2">
          <img src="${img}" class="img-fluid rounded shadow" style="max-height:180px">
        </div>` : ""}
        <input type="text" class="form-control answer" data-answer="${answer}">
        <div class="feedback text-danger mt-1 d-none"></div>
      </div>
    `;
  }
}

/* =============================
   Corregir respuestas
============================= */
function checkAnswers() {
  const inputs = document.querySelectorAll(".answer");
  let correct = 0;

  inputs.forEach(input => {
    const user = normalize(input.value);
    const ok = normalize(input.dataset.answer);
    const feedback = input.nextElementSibling;

    input.classList.remove("correct", "incorrect");
    feedback.classList.add("d-none");

    if (ok.split("/").includes(user)) {
      input.classList.add("correct");
      correct++;
    } else {
      input.classList.add("incorrect");
      feedback.classList.remove("d-none");
      feedback.innerHTML = `✔ Respuesta correcta: <b>${input.dataset.answer}</b>`;
    }
  });

  const result = document.getElementById("result");
  result.classList.remove("d-none");
  result.innerHTML = `<strong>Resultado:</strong> ${correct} / ${TOTAL_QUESTIONS}`;
}
</script>

</body>
</html>
