<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irregular Verbs Test</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }
        .correct {
            border: 2px solid #198754 !important;
            background-color: #d1e7dd !important;
        }
        .incorrect {
            border: 2px solid #dc3545 !important;
            background-color: #f8d7da !important;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-body">

            <h1 class="text-center mb-4">Irregular Verbs Test</h1>

            <div id="quiz"></div>

            <div class="d-flex justify-content-between mt-4">
                <button class="btn btn-primary" onclick="generateTest()">Nuevo Test</button>
                <button class="btn btn-success" onclick="checkAnswers()">Corregir</button>
            </div>

            <div id="result" class="alert alert-info mt-4 d-none"></div>

        </div>
    </div>
</div>

<script>
let verbs = [];
const TOTAL_QUESTIONS = 20;

/* =============================
   Cargar CSV
============================= */
fetch("verbs.csv")
    .then(res => res.text())
    .then(data => {
        const rows = data.split("\n").slice(1);
        verbs = rows
            .map(r => r.trim())
            .filter(r => r)
            .map(r => {
                const [inf, past, part, esp] = r.split(",");
                return {
                    inf: inf?.trim(),
                    past: past?.trim().toLowerCase(),
                    part: part?.trim().toLowerCase(),
                    esp: esp?.trim().toLowerCase()
                };
            });

        generateTest();
    });

/* =============================
   Utilidades
============================= */
function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function normalize(text) {
    return text
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
}

/* =============================
   Generar Test
============================= */
function generateTest() {
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");

    quiz.innerHTML = "";
    result.classList.add("d-none");
    result.innerHTML = "";

    for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
        const v = randomItem(verbs);
        const type = Math.floor(Math.random() * 3);

        let question = "";
        let answer = "";

        if (type === 0) {
            question = `Pasado simple de <b>${v.inf}</b>`;
            answer = v.past;
        } else if (type === 1) {
            question = `Participio pasado de <b>${v.inf}</b>`;
            answer = v.part;
        } else {
            question = `Significado en español de <b>${v.inf}</b>`;
            answer = v.esp;
        }

        quiz.innerHTML += `
            <div class="mb-3">
                <label class="form-label">${i}. ${question}</label>
                <input type="text"
                       class="form-control answer"
                       data-answer="${answer}">
                <div class="feedback text-danger mt-1 d-none"></div>
            </div>
        `;
    }
}

/* =============================
   Corregir respuestas
============================= */
function checkAnswers() {
    const inputs = document.querySelectorAll(".answer");
    let correct = 0;

    inputs.forEach(input => {
        const userAnswer = normalize(input.value);
        const correctAnswer = normalize(input.dataset.answer);
        const feedback = input.nextElementSibling;

        input.classList.remove("correct", "incorrect");
        feedback.classList.add("d-none");
        feedback.innerHTML = "";

        
        const validAnswers = correctAnswer
            .split("/")
            .map(a => normalize(a));

        if (validAnswers.includes(userAnswer)) {
            input.classList.add("correct");
            correct++;
        } else {
            input.classList.add("incorrect");
            feedback.classList.remove("d-none");
            feedback.innerHTML = `
                ✔ Respuesta correcta: 
                <strong>${input.dataset.answer}</strong>
            `;
        }
    });

    const result = document.getElementById("result");
    result.classList.remove("d-none");
    result.innerHTML = `
        <strong>Resultado final:</strong> ${correct} / ${TOTAL_QUESTIONS} correctas
    `;
}
</script>

</body>
</html>
