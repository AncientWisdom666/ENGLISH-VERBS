<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio de sesión</title>
  
  <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon">
  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="./Init/css/login.css">

  <script>
    if (localStorage.getItem("auth") === "true") {
      window.location.replace("./hub/hub.html");
    }
  </script>
</head>

<body>

  <div class="login-page">
    <div class="login-wrapper shadow-lg">

      <!-- IZQUIERDA: FORMULARIO -->
            <!-- IZQUIERDA: FORMULARIO -->
      <div class="login-form">

        <!-- Logo + Título -->
        <div class="text-center mb-4">
          <img 
              src="https://img.freepik.com/premium-photo/watercolor-painting-blue-silhouette-snowflake-merry-christmas-happy-new-year-winter-illustration-design-isolated-white-background_276714-817.jpg"
              alt="Copo de nieve"
              class="logo-nieve"
          >
        </div>

        <h2 class="text-center mb-1">Snow English</h2>
        <p class="welcome-text text-center mb-4">
          Bienvenidos al portal ❄️
        </p>

        <h4 class="text-center mb-4">Inicio de sesión</h4>

        <div class="mb-3">
          <input type="text" id="usuario" class="form-control" placeholder="Usuario">
        </div>

        <div class="mb-3">
          <input type="password" id="password" class="form-control" placeholder="Contraseña">
        </div>

        <button class="btn btn-primary w-100" onclick="login()">
          Ingresar
        </button>

        <p id="mensaje" class="text-danger text-center mt-3"></p>
      </div>

      <!-- DERECHA: VIDEO DESDE DROPBOX ----->
      <div class="login-video">
        <video autoplay muted loop playsinline poster="https://www.dropbox.com/scl/fi/ft17uc60z58v62vqde5ud/inir.png?rlkey=1hn7yuod8ghmjeb8lt87jm0ul&st=1anx5084&dl=0">
          <source src="https://dl.dropboxusercontent.com/scl/fi/q3scxiaviek90wh3glc5y/winter.mp4?rlkey=nkkqfil4cscsyvcyxwhep2lq5&st=pzw8ausk" type="video/mp4">
          Tu navegador no soporta el formato de video.
        </video>
        
        <div class="video-overlay"></div>
      </div>

    </div>
  </div>

  <div class="snow"></div>

  <script src="./Init/js/login.js"></script>
</body>
</html>
